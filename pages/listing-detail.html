<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listing Detail - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-6xl flex-col gap-6 px-6 py-10">
      <section class="grid gap-6 lg:grid-cols-[1.2fr_1fr]">
        <article class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900">
          <img class="hidden h-full max-h-[460px] w-full object-cover" id="listing-image" alt="Listing image" />
          <div class="flex min-h-[320px] items-center justify-center bg-slate-800 text-sm text-slate-400" id="listing-image-fallback">
            No listing image
          </div>
        </article>

        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
          <p class="text-xs uppercase tracking-wide text-indigo-300">Listing detail</p>
          <h1 class="mt-2 text-3xl font-semibold" id="listing-title">Loading...</h1>
          <p class="mt-3 text-sm text-slate-300" id="listing-description"></p>

          <div class="mt-6 grid gap-3 text-sm">
            <p>Kategori: <span class="text-slate-200" id="listing-category">-</span></p>
            <p>Harga katalog: <span class="font-semibold text-indigo-300" id="listing-price">-</span></p>
            <p>Status lelang: <span class="text-slate-200" id="listing-auction-status">-</span></p>
            <p>Berakhir: <span class="text-slate-200" id="listing-ends-at">-</span></p>
            <p>
              Seller:
              <a class="text-indigo-300 underline-offset-4 hover:underline" id="listing-seller-link" href="#">
                -
              </a>
            </p>
          </div>

          <div class="mt-6 flex flex-wrap gap-3">
            <a class="hidden rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-400" id="open-auction-link" href="#">
              Open auction detail
            </a>
            <a class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-semibold text-slate-200 hover:bg-slate-800" href="/pages/listings.html">
              Back to catalog
            </a>
          </div>
        </article>
      </section>

      <section class="hidden rounded-2xl border border-slate-800 bg-slate-900 p-6" id="owner-actions">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="text-xl font-semibold">Owner actions</h2>
            <p class="text-sm text-slate-400">You can update the description, image, or category while this listing has no bids.</p>
          </div>
          <button class="rounded-lg border border-rose-500/50 bg-rose-500/10 px-4 py-2 text-sm font-semibold text-rose-200 hover:bg-rose-500/20" id="listing-cancel-button" type="button">
            Cancel listing
          </button>
        </div>

        <form class="mt-6 grid gap-4 md:grid-cols-2" id="listing-edit-form">
          <label class="flex flex-col gap-2 text-sm md:col-span-2">
            Description
            <textarea class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-2 text-slate-100" id="edit-description" rows="4" required></textarea>
          </label>

          <label class="flex flex-col gap-2 text-sm md:col-span-2">
            Image URL
            <input class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-2 text-slate-100" id="edit-image-url" type="url" />
          </label>

          <label class="flex flex-col gap-2 text-sm md:col-span-2">
            Category
            <select class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-2 text-slate-100" id="edit-category"></select>
          </label>

          <button class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-400 md:col-span-2" type="submit">
            Save changes
          </button>
          <p class="text-sm text-rose-300 md:col-span-2" id="owner-error"></p>
        </form>
      </section>

      <section class="hidden rounded-2xl border border-rose-900/40 bg-rose-950/40 p-6 text-sm text-rose-200" id="detail-error-box">
        <p id="detail-error-message">Failed to load listing details.</p>
      </section>
    </main>

    <div id="footer"></div>

    <script src="/assets/js/config.js"></script>
    <script type="module" src="/assets/js/listing-detail.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
