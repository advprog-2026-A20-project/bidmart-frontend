name: Deploy to Heroku

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: "bidmart-frontend-a20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Heroku secret
        run: |
          if [ -z "${HEROKU_API_KEY:-}" ]; then
            echo "HEROKU_API_KEY is empty or not available to this workflow"
            exit 1
          fi
          echo "HEROKU_API_KEY detected"

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        run: heroku container:login

      - name: Build and push image
        run: heroku container:push web --app "$HEROKU_APP_NAME"

      - name: Release image
        run: heroku container:release web --app "$HEROKU_APP_NAME"
