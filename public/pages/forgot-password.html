<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-5xl flex-col justify-center px-6 py-10">
      <div class="mx-auto w-full max-w-md rounded-2xl bg-white p-8 text-slate-900 shadow-xl">
        <h1 class="text-3xl font-semibold">Forgot Password</h1>
        <p class="mt-2 text-sm text-slate-500">Reset password menggunakan OTP yang dikirim lewat email.</p>

        <section class="mt-8 space-y-4" id="forgot-step-email">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Step 1: Kirim OTP</h2>
          <form class="space-y-4" id="forgot-password-form">
            <label class="flex flex-col gap-2 text-sm font-medium">
              Email
              <input
                class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
                type="email"
                name="email"
                required
              />
            </label>
            <button
              class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:bg-indigo-300"
              type="submit"
              data-default-text="Kirim OTP"
            >
              Kirim OTP
            </button>
            <p class="text-sm text-rose-600" id="forgot-error"></p>
          </form>
        </section>

        <section class="mt-8 hidden space-y-4" id="forgot-step-verify">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Step 2: Verifikasi OTP</h2>
          <form class="space-y-4" id="verify-otp-form">
            <label class="flex flex-col gap-2 text-sm font-medium">
              OTP (6 digit)
              <input
                class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
                type="text"
                name="otp"
                inputmode="numeric"
                maxlength="6"
                minlength="6"
                required
              />
            </label>
            <button
              class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:bg-indigo-300"
              type="submit"
              data-default-text="Verifikasi OTP"
            >
              Verifikasi OTP
            </button>
            <p class="text-sm text-rose-600" id="verify-error"></p>
          </form>
        </section>

        <section class="mt-8 hidden space-y-4" id="forgot-step-reset">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Step 3: Password Baru</h2>
          <form class="space-y-4" id="reset-password-form">
            <label class="flex flex-col gap-2 text-sm font-medium">
              Password Baru
              <input
                class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
                type="password"
                name="newPassword"
                minlength="8"
                required
              />
            </label>
            <button
              class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:bg-indigo-300"
              type="submit"
              data-default-text="Reset Password"
            >
              Reset Password
            </button>
            <p class="text-sm text-rose-600" id="reset-error"></p>
          </form>
        </section>

        <p class="mt-6 text-sm text-slate-500">
          Kembali ke
          <a class="text-indigo-500" href="/pages/login.html">Login</a>
        </p>
      </div>
    </main>

    <div id="footer"></div>

    <script src="/runtime-config.js"></script>
    <script src="/assets/js/config.js"></script>
    <script type="module" src="/assets/js/forgot-password.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
