<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Profile - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-5xl flex-col justify-center px-6 py-10">
      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-8">
        <p class="text-xs uppercase tracking-wide text-indigo-300">Public seller profile</p>
        <h1 class="mt-2 text-3xl font-semibold" id="seller-email">Loading...</h1>
        <p class="mt-2 text-sm text-slate-400">Role: <span id="seller-role">-</span></p>

        <div class="mt-8 grid gap-4 md:grid-cols-3">
          <article class="rounded-xl border border-slate-800 bg-slate-950 p-5">
            <p class="text-xs uppercase tracking-wide text-slate-500">Active listings</p>
            <p class="mt-3 text-3xl font-semibold" id="seller-active-listings">0</p>
          </article>
          <article class="rounded-xl border border-slate-800 bg-slate-950 p-5">
            <p class="text-xs uppercase tracking-wide text-slate-500">Live auctions</p>
            <p class="mt-3 text-3xl font-semibold" id="seller-live-auctions">0</p>
          </article>
          <article class="rounded-xl border border-slate-800 bg-slate-950 p-5">
            <p class="text-xs uppercase tracking-wide text-slate-500">Completed auctions</p>
            <p class="mt-3 text-3xl font-semibold" id="seller-completed-auctions">0</p>
          </article>
        </div>
      </section>

      <section class="mt-6 hidden rounded-2xl border border-rose-900/40 bg-rose-950/40 p-6 text-sm text-rose-200" id="seller-profile-error">
        <p id="seller-profile-error-message">Failed to load seller profile.</p>
      </section>
    </main>

    <div id="footer"></div>

    <script src="/assets/js/config.js"></script>
    <script type="module" src="/assets/js/seller-profile.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
