<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lelang - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-6xl flex-col gap-8 px-6 py-10">
      <header class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-semibold">Lelang</h1>
          <p class="text-sm text-slate-400">Pantau status lelang dan penawaran terkini.</p>
        </div>
      </header>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <form class="flex flex-wrap items-end gap-4" id="auction-filter-form">
          <label class="flex min-w-48 flex-col gap-2 text-sm">
            Status
            <select class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-2 text-slate-100" id="auction-status" name="status">
              <option value="ALL">ALL</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="EXTENDED">EXTENDED</option>
              <option value="CLOSED">CLOSED</option>
              <option value="WON">WON</option>
              <option value="UNSOLD">UNSOLD</option>
              <option value="DRAFT">DRAFT</option>
              <option value="CANCELLED">CANCELLED</option>
            </select>
          </label>
          <button class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-400" type="submit">Apply filter</button>
          <button class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-semibold text-slate-200 hover:bg-slate-800" type="reset">Reset</button>
        </form>
      </section>

      <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3" id="auctions-container"></section>

      <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3" id="auctions-skeleton">
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-3/5 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-2/5 rounded bg-slate-800"></div>
          <div class="mt-4 h-10 w-full rounded bg-slate-800"></div>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-2/4 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-1/3 rounded bg-slate-800"></div>
          <div class="mt-4 h-10 w-full rounded bg-slate-800"></div>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-1/2 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-2/5 rounded bg-slate-800"></div>
          <div class="mt-4 h-10 w-full rounded bg-slate-800"></div>
        </div>
      </section>

      <div class="hidden" id="auctions-empty">
        <p class="rounded-2xl border border-slate-800 bg-slate-900 p-6 text-center text-sm text-slate-400">
          Belum ada lelang tersedia.
        </p>
      </div>

      <div class="hidden" id="auctions-error">
        <div class="rounded-2xl border border-rose-900/40 bg-rose-950/40 p-6 text-center text-sm text-rose-200">
          <p id="auctions-error-message">Gagal memuat data lelang.</p>
          <button class="mt-4 rounded-full bg-rose-500 px-4 py-2 text-xs font-semibold text-white" id="auctions-retry" type="button">
            Coba Lagi
          </button>
        </div>
      </div>
    </main>

    <div id="footer"></div>

    <script src="/assets/js/config.js"></script>
    <script type="module" src="/assets/js/lelang.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
